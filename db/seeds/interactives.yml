  - key: 'it_errors.recursive_catastrophe'
    category: 'it_errors'
    kind: 'sandbox_code_fix'
    title: 'Рекурсивная катастрофа'
    description: 'Песочница с рекурсивной функцией. Исправь, запусти, получи правильный вывод.'
    xp_reward: 100
    difficulty: 5
    variants:
      - seed: 1
        expected_answer: 'recur-fixed-1'
        broken_code: |
          function f(n) {
            return f(n - 1);
          }
          console.log(f(5));
        expected_output: '0'
        max_attempts: 5
        required_patterns: ['function', 'f(', 'return']
        hint: 'Добавь if (n <= 0) return n.'
      - seed: 2
        expected_answer: 'recur-fixed-2'
        broken_code: |
          function fact(n) {
            return n * fact(n - 1);
          }
          console.log(fact(5));
        expected_output: '120'
        max_attempts: 5
        required_patterns: ['function', 'fact', '*', 'return']
        hint: 'Base case для n <= 1.'
      - seed: 3
        expected_answer: 'recur-fixed-3'
        broken_code: |
          function fib(n) {
            return fib(n - 1) + fib(n - 2);
          }
          console.log(fib(7));
        expected_output: '13'
        max_attempts: 5
        required_patterns: ['function', 'fib', 'return', '+']
        hint: 'fib(0)=0, fib(1)=1.'

