  - key: 'it_errors.groundhog_day'
    category: 'it_errors'
    kind: 'sandbox_code_fix'
    title: 'День сурка'
    description: 'Исправь бесконечный цикл — нужно собрать конкретный результат.'
    xp_reward: 80
    difficulty: 4
    variants:
      - seed: 1
        expected_answer: 'fixed-loop-1'
        broken_code: |
          let result = '';
          let i = 0;
          while (true) {
            result += i;
            i++;
          }
          console.log(result);
        expected_output: '01234'
        required_patterns: ['while', 'result', '+=', 'i++']
        fix_hint: 'Добавь условие выхода: while (i < 5).'
      - seed: 2
        expected_answer: 'fixed-loop-2'
        broken_code: |
          let chars = '';
          let n = 65;
          for (;;) {
            chars += String.fromCharCode(n);
            n++;
          }
          console.log(chars);
        expected_output: 'ABC'
        required_patterns: ['for', 'String.fromCharCode', 'chars']
        fix_hint: 'Добавь условие: for (; n < 68 ;).'
      - seed: 3
        expected_answer: 'fixed-loop-3'
        broken_code: |
          function recurse(acc) {
            return recurse(acc + 'x');
          }
          console.log(recurse(''));
        expected_output: 'xxx'
        required_patterns: ['recurse', 'return', 'acc']
        fix_hint: 'Добавь base case: if (acc.length === 3) return acc.'

