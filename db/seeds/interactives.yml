  - key: 'it_errors.error_chain'
    category: 'it_errors'
    kind: 'sandbox_code_fix'
    title: 'Цепочка ошибок'
    description: 'В коде несколько багов. Почини все, чтобы получить корректный результат.'
    xp_reward: 90
    difficulty: 4
    variants:
      - seed: 1
        expected_answer: 'chain-fixed-1'
        bugs: ['null deref', 'type mismatch', 'off-by-one']
        broken_code: |
          const arr = null;
          const sum = arr.length;
          let total = 0;
          for (let i = 0; i <= arr.length; i++) {
            total += i;
          }
          console.log(total);
        expected_output: '15'
        required_patterns: ['arr', 'for', 'total', '+=']
        hint: 'Инициализируй arr массивом, поправь off-by-one (<=), сумма 1..5 = 15.'
      - seed: 2
        expected_answer: 'chain-fixed-2'
        bugs: ['null deref', 'method on undefined', 'type confusion']
        broken_code: |
          const user = null;
          const name = user.name;
          const greeting = name.toUpperCase();
          console.log(greeting);
        expected_output: 'HELLO'
        required_patterns: ['user', 'name', 'toUpperCase']
        hint: 'Инициализируй user объектом { name: "hello" }.'
      - seed: 3
        expected_answer: 'chain-fixed-3'
        bugs: ['syntax error', 'wrong call', 'return missing']
        broken_code: |
          functoin compute(x {
            x * 2;
          }
          console.log(compute(21));
        expected_output: '42'
        required_patterns: ['function', 'compute', 'return']
        hint: 'function (не functoin), скобки, добавь return.'

