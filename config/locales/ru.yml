    console_lines:
      403: |
        >_ Action not allowed
        >_ Path: %{path}
        >_ Status: 403 Forbidden
        >_ Solution: Go back or check permissions
      404: |
        >_ The requested resource was not found
        >_ Path: %{path}
        >_ Status: 404 Not Found
        >_ Solution: Check URL or return to homepage
      418: |
        >_ I'm a teapot (RFC 2324)
        >_ Path: %{path}
        >_ Status: 418 I'm a teapot
        >_ Solution: Brew tea or return to homepage
      422: |
        >_ Request cannot be processed
        >_ Path: %{path}
        >_ Status: 422 Unprocessable Entity
        >_ Solution: Check the submitted data and try again
      429: |
        >_ Too many requests
        >_ Path: %{path}
        >_ Status: 429 Too Many Requests
        >_ Solution: Wait a bit before sending the next request
      500: |
        >_ Something went wrong
        >_ Path: %{path}
